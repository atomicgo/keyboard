version: "3"

tasks:
  test:
    desc: Run all tests
    env:
      CGO_ENABLED: 1
    cmds:
      - go test -race ./...

  benchmark:
    desc: Run all benchmarks
    aliases: [bench]
    cmds:
      - go test -bench=. ./...

  tdd:
    desc: Test Driven Development - Watch tests
    env:
      CGO_ENABLED: 1
    watch: true
    sources:
      - "**/*.go"
    cmds:
      - go test -race ./...

  lint:
    desc: Run all linters
    cmds:
      - go mod tidy
      - wsl --allow-cuddle-declarations --force-err-cuddling --force-case-trailing-whitespace 3 --fix ./...
      - golangci-lint run
