version: "3"

tasks:
  test:
    desc: Run all tests
    env:
      CGO_ENABLED: 1
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    cmds:
      - go test -race ./...

  release:patch:
    desc: Create and push the next patch release tag
    deps: [test]
    cmds:
      - bash scripts/release-tag.sh --patch

  release:minor:
    desc: Create and push the next minor release tag
    deps: [test]
    cmds:
      - bash scripts/release-tag.sh --minor

  release:major:
    desc: Create and push the next major release tag
    deps: [test]
    cmds:
      - bash scripts/release-tag.sh --major

  benchmark:
    desc: Run all benchmarks
    aliases: [bench]
    cmds:
      - go test -bench=. ./...

  tdd:
    desc: Test Driven Development - Watch tests
    env:
      CGO_ENABLED: 1
    watch: true
    sources:
      - "**/*.go"
    cmds:
      - go test -race ./...

  lint:
    desc: Run all linters
    cmds:
      - go mod tidy
      - wsl --allow-cuddle-declarations --force-err-cuddling --force-case-trailing-whitespace 3 --fix ./...
      - golangci-lint run
